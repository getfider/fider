name: publish

on:
  workflow_run:
    workflows: ["build"]
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip fork PRs: checkout refuses fork code in a trusted workflow_run context (pwn-request
    # guard), and this job holds Docker Hub secrets. Fork PR images can be published on demand via
    # publish-pr-multiarch.yml after review.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          (github.event.workflow_run.event != 'pull_request' ||
           github.event.workflow_run.head_repository.full_name == github.repository) }}
    steps:
      - name: Dump GitHub context
        run: echo "$GITHUB_CONTEXT"
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: build and push docker image (pull_request)
        if: ${{ github.event.workflow_run.event == 'pull_request' }}
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          build-args: COMMITHASH=${{ github.event.workflow_run.head_sha }}
          platforms: linux/amd64
          tags: getfider/fider:PR_${{ github.event.workflow_run.pull_requests[0].number }}
          cache-from: type=gha
          # PR-triggered workflow_run gets a read-only cache token, so cache writes are
          # denied; ignore-error keeps that from failing the build (reads still work).
          cache-to: type=gha,mode=max,ignore-error=true

      - name: build and push docker image (push branch)
        if: ${{ github.event.workflow_run.event == 'push' }}
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          build-args: COMMITHASH=${{ github.event.workflow_run.head_sha }}
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            getfider/fider:SHA_${{ github.event.workflow_run.head_sha }}
            getfider/fider:${{ github.event.workflow_run.head_branch == 'main' && 'main' || 'stable' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build and push docker image (push tag)
        if: ${{ github.event.workflow_run.event == 'release' }}
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          build-args: |
            COMMITHASH=${{ github.event.workflow_run.head_sha }}
            VERSION=${{ github.event.workflow_run.display_title }}
          platforms: linux/amd64,linux/arm64/v8
          tags: getfider/fider:${{ github.event.workflow_run.display_title }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
