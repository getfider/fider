name: Continuous Integration Pipeline
# Comprehensive CI/CD workflow for Fider project
# Triggers: Push to main/stable, Pull Requests, Release Published
# Duration: ~3-4 minutes (parallel execution)

on:
  push:
    branches:
      - main
      - stable
  pull_request:
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Global environment variables
  GO_VERSION: '1.25'
  NODE_VERSION: '22.x'
  POSTGRES_VERSION: '17'

jobs:
  # ============================================================================
  # STAGE 1: FRONTEND TESTING
  # Tests React components, TypeScript, and ESLint rules
  # ============================================================================
  test-ui:
    name: test-ui
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --maxsockets 1

      - name: Run ESLint
        id: lint
        run: |
          echo "::group::ESLint Results"
          make lint-ui 2>&1 | tee lint-report.txt || true
          echo "::endgroup::"
        continue-on-error: false

      - name: Generate ESLint JSON report
        run: |
          npx eslint . --format json --output-file eslint-report.json || true

      - name: Run Jest tests with coverage
        id: test
        run: |
          echo "::group::Jest Test Results"
          npm test -- --coverage --coverageReporters=json --coverageReporters=text --coverageReporters=html --passWithNoTests 2>&1 | tee test-output.txt
          echo "::endgroup::"
        continue-on-error: false

      - name: Generate test summary
        if: always()
        run: |
          cat > ui-test-summary.md << 'EOF'
          # Frontend Test Report
          
          ## Test Execution Summary
          - **Test Framework**: Jest
          - **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - **Status**: ${{ job.status }}
          
          ## Coverage Metrics
          $(cat coverage/coverage-summary.json | jq '."total"' || echo "No coverage data")
          
          ## Lint Check
          $([ -f eslint-report.json ] && echo "✅ ESLint Report Generated" || echo "⚠️ No ESLint data")
          EOF
          cat ui-test-summary.md

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-test-results
          path: |
            coverage/
            eslint-report.json
            lint-report.txt
            test-output.txt
            ui-test-summary.md
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/*junit.xml
          check_name: Frontend Tests
        continue-on-error: true

  # ============================================================================
  # STAGE 2: BACKEND TESTING
  # Tests Go server, database interactions, and API endpoints
  # ============================================================================
  test-server:
    name: test-server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Service containers for testing
    services:
      # PostgreSQL database for tests
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_USER: fider_ci
          POSTGRES_PASSWORD: fider_ci_pw
          POSTGRES_DB: fider_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # MinIO for S3-compatible storage
      minio:
        image: getfider/minio:0.0.2
        ports:
          - 9000:9000
        env:
          MINIO_ACCESS_KEY: s3user
          MINIO_SECRET_KEY: s3user-s3cr3t

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --maxsockets 1

      - name: Install golangci-lint
        run: >
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh |
          sh -s -- -b $(go env GOPATH)/bin v2.7.2

      - name: Install godotenv
        run: go install github.com/joho/godotenv/cmd/godotenv@latest

      - name: Run golangci-lint
        id: lint
        run: |
          echo "::group::Linting Results"
          make lint-server 2>&1 | tee golangci-report.txt || true
          echo "::endgroup::"
        continue-on-error: false

      - name: Run Go tests with coverage
        id: test
        run: |
          echo "::group::Go Test Results"
          mkdir -p ./dist
          make test-server SHORT=false 2>&1 | tee test-output.txt
          echo "::endgroup::"
        env:
          BLOB_STORAGE_S3_ENDPOINT_URL: http://localhost:9000
          DATABASE_URL: postgres://fider_ci:fider_ci_pw@localhost:5432/fider_ci?sslmode=disable
        continue-on-error: false

      - name: Generate coverage report
        if: always()
        run: |
          go tool cover -html=coverage.out -o coverage-report.html || true
          echo "Coverage report generated"

      - name: Generate test summary
        if: always()
        run: |
          cat > server-test-summary.md << 'EOF'
          # Backend Test Report
          
          ## Test Execution Summary
          - **Language**: Go 1.25
          - **Test Framework**: Go Testing Package
          - **Database**: PostgreSQL 17
          - **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - **Status**: ${{ job.status }}
          
          ## Coverage Metrics
          $(go tool cover -func=coverage.out 2>/dev/null | tail -1 || echo "Coverage data not available")
          
          ## Lint Check
          - **Linter**: golangci-lint v2.7.2
          - **Status**: ${{ steps.lint.outcome }}
          
          ## Test Output
          $(head -20 test-output.txt || echo "No test output")
          EOF
          cat server-test-summary.md

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: server-test-results
          path: |
            coverage.out
            coverage-report.html
            golangci-report.txt
            test-output.txt
            server-test-summary.md
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Tests
          path: test-results.json
          reporter: 'go-test'
        continue-on-error: true

  # ============================================================================
  # STAGE 3: BUILD DOCKER IMAGE
  # Compiles multi-stage Docker image for deployment
  # ============================================================================
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: []  # No dependencies - runs in parallel with tests

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      build-summary: ${{ steps.summary.outputs.result }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract metadata
        id: meta
        run: |
          echo "sha7=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "build_time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        id: build
        run: |
          echo "::group::Docker Build Logs"
          docker build \
            --tag fider-image:latest \
            --tag fider-image:${{ steps.meta.outputs.sha7 }} \
            --label "org.opencontainers.image.created=${{ steps.meta.outputs.build_time }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
            --progress=plain \
            . 2>&1 | tee docker-build.log
          echo "::endgroup::"
          DIGEST=$(docker inspect --format='{{.RepoDigests}}' fider-image:latest)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          docker inspect fider-image:latest > image-info.json

      - name: Verify Docker image
        id: verify
        run: |
          echo "::group::Docker Image Verification"
          echo "Image Size:"
          docker images | grep fider-image
          echo "Image Layers:"
          docker inspect fider-image:latest --format='{{json .RootFS.Layers}}' | jq . || true
          echo "Image Config:"
          docker inspect fider-image:latest --format='{{json .Config}}' | jq . || true
          echo "::endgroup::"

      - name: Create build artifacts
        run: |
          mkdir -p ./out
          docker save -o ./out/fider-image.tar fider-image:latest
          ls -lh ./out/fider-image.tar

      - name: Store PR number (for E2E tests)
        if: github.event_name == 'pull_request'
        run: |
          echo ${{ github.event.number }} > ./out/pr

      - name: Store image metadata
        run: |
          echo ${{ steps.meta.outputs.sha7 }} > ./out/sha7
          echo ${{ github.ref }} > ./out/ref
          cat > ./out/build-metadata.json << 'EOF'
          {
            "sha": "${{ github.sha }}",
            "sha7": "${{ steps.meta.outputs.sha7 }}",
            "ref": "${{ github.ref }}",
            "version": "${{ steps.meta.outputs.version }}",
            "build_time": "${{ steps.meta.outputs.build_time }}",
            "actor": "${{ github.actor }}"
          }
          EOF
          cat ./out/build-metadata.json

      - name: Generate build report
        id: summary
        run: |
          cat > build-summary.md << 'EOF'
          # Build Report
          
          ## Build Information
          - **Commit SHA**: ${{ github.sha }}
          - **Commit SHA7**: ${{ steps.meta.outputs.sha7 }}
          - **Branch**: ${{ github.ref }}
          - **Version**: ${{ steps.meta.outputs.version }}
          - **Build Time**: ${{ steps.meta.outputs.build_time }}
          - **Triggered by**: ${{ github.actor }}
          - **Event**: ${{ github.event_name }}
          
          ## Build Status
          - **Status**: ${{ job.status }}
          - **Build Duration**: Check workflow run
          
          ## Docker Image Details
          - **Tag**: fider-image:${{ steps.meta.outputs.sha7 }}
          - **Digest**: ${{ steps.build.outputs.digest }}
          
          ## Build Artifacts
          - **Docker Archive**: fider-image.tar
          - **Image Metadata**: image-info.json
          - **Build Metadata**: build-metadata.json
          - **Build Logs**: docker-build.log
          EOF
          cat build-summary.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: fider-image
          path: |
            out/
            build-summary.md
            docker-build.log
            image-info.json
          retention-days: 7

  # ============================================================================
  # STAGE 4: END-TO-END TESTING (Optional)
  # Tests complete user workflows with real browser
  # ============================================================================
  test-e2e:
    name: test-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_USER: fider
          POSTGRES_PASSWORD: fider_pw
          POSTGRES_DB: fider
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Docker image artifact
        uses: actions/download-artifact@v6
        with:
          name: fider-image
          path: ./out

      - name: Load Docker image
        run: |
          docker load -i ./out/fider-image.tar
          docker images | grep fider

      - name: Start Fider container
        run: |
          echo "::group::Starting Container"
          docker run -d \
            --name fider \
            -e DATABASE_URL="postgres://fider:fider_pw@localhost:5432/fider" \
            -e JWT_SECRET="test-secret-key" \
            -e ENVIRONMENT=test \
            -p 3000:3000 \
            fider-image:latest
          echo "::endgroup::"

      - name: Wait for app to be healthy
        run: |
          echo "::group::Health Check"
          timeout 60 bash -c 'until curl -f http://localhost:3000/health; do sleep 1; done'
          echo "::endgroup::"

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        id: e2e-test
        run: |
          echo "::group::E2E Test Execution"
          make test-e2e 2>&1 | tee e2e-test.log || true
          echo "::endgroup::"
        continue-on-error: false

      - name: Generate E2E report
        if: always()
        run: |
          cat > e2e-test-summary.md << 'EOF'
          # End-to-End Test Report
          
          ## Test Execution Summary
          - **Framework**: Playwright + Cucumber
          - **Environment**: Docker Container
          - **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - **Status**: ${{ job.status }}
          
          ## Test Results
          $(grep -E "^(✓|✗|Scenario)" e2e-test.log 2>/dev/null | head -20 || echo "Test output processing...")
          
          ## Container Status
          $(docker ps --filter "name=fider" --format "table {{.Names}}\t{{.Status}}" || echo "Container info unavailable")
          EOF
          cat e2e-test-summary.md

      - name: Upload E2E test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-test-results
          path: |
            e2e/results/
            e2e-test.log
            e2e-test-summary.md
          retention-days: 30

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
        continue-on-error: true

      - name: Publish E2E test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Tests
          path: e2e/results/**/*.json
          reporter: 'jest-junit'
        continue-on-error: true

  # ============================================================================
  # SUMMARY: Status Check
  # Aggregates all job statuses for branch protection
  # ============================================================================
  ci-status:
    name: CI Status Report
    runs-on: ubuntu-latest
    if: always()
    needs: [test-ui, test-server, build, test-e2e]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: ci-reports

      - name: Generate CI Summary Report
        id: summary
        run: |
          cat > CI_REPORT.md << 'EOF'
          # Continuous Integration Report
          
          **Report Generated**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')  
          **Workflow**: ${{ github.workflow }}  
          **Run**: #${{ github.run_number }}  
          **Commit**: ${{ github.sha }}  
          **Branch**: ${{ github.ref }}  
          **Author**: ${{ github.actor }}  
          
          ---
          
          ## Pipeline Status Summary
          
          | Job | Status | Duration |
          |-----|--------|----------|
          | 🧪 test-ui | ${{ needs.test-ui.result }} | Check workflow |
          | 🧪 test-server | ${{ needs.test-server.result }} | Check workflow |
          | 🐳 build | ${{ needs.build.result }} | Check workflow |
          | 🎭 test-e2e | ${{ needs.test-e2e.result }} | Check workflow |
          
          **Overall Status**: 
          - ✅ **PASSED** if all jobs succeeded
          - ❌ **FAILED** if any job failed
          
          ---
          
          ## Detailed Results
          
          ### Frontend Tests (test-ui)
          - Status: ${{ needs.test-ui.result }}
          - Artifacts: ui-test-results/
          - Includes: Coverage reports, ESLint results, test output
          
          ### Backend Tests (test-server)
          - Status: ${{ needs.test-server.result }}
          - Artifacts: server-test-results/
          - Includes: Coverage reports, lint results, test output
          
          ### Docker Build (build)
          - Status: ${{ needs.build.result }}
          - Artifacts: fider-image/
          - Includes: Docker image TAR, build logs, metadata
          
          ### E2E Tests (test-e2e)
          - Status: ${{ needs.test-e2e.result }}
          - Artifacts: e2e-test-results/, playwright-report/
          - Includes: Test logs, Playwright artifacts
          
          ---
          
          ## How to Access Reports
          
          1. **Go to Workflow Run**: GitHub Actions → CI Pipeline → Run #${{ github.run_number }}
          2. **Download Artifacts**: Scroll down and download individual artifact zips
          3. **View Details**:
             - Frontend coverage: Extract ui-test-results/coverage/
             - Backend coverage: Extract server-test-results/coverage-report.html
             - Build logs: Extract fider-image/docker-build.log
             - E2E results: Extract e2e-test-results/
          
          ---
          
          ## Next Steps
          
          EOF
          
          # Add conditional next steps
          if [[ "${{ needs.test-ui.result }}" == "success" && \
                "${{ needs.test-server.result }}" == "success" && \
                "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ All required checks passed" >> CI_REPORT.md
            echo "" >> CI_REPORT.md
            echo "### Actions Available:" >> CI_REPORT.md
            echo "- [ ] Review E2E test results" >> CI_REPORT.md
            echo "- [ ] Approve and deploy to staging" >> CI_REPORT.md
            echo "- [ ] Merge pull request (if approved by reviewers)" >> CI_REPORT.md
          else
            echo "❌ Pipeline has failures" >> CI_REPORT.md
            echo "" >> CI_REPORT.md
            echo "### Required Actions:" >> CI_REPORT.md
            echo "- [ ] Check failed job logs" >> CI_REPORT.md
            echo "- [ ] Review test failures" >> CI_REPORT.md
            echo "- [ ] Fix issues and push new commit" >> CI_REPORT.md
          fi
          
          echo "" >> CI_REPORT.md
          echo "---" >> CI_REPORT.md
          echo "## Artifact Availability" >> CI_REPORT.md
          echo "" >> CI_REPORT.md
          echo "All artifacts are automatically purged after 30 days." >> CI_REPORT.md
          echo "To retain longer, download and archive before expiration." >> CI_REPORT.md
          
          cat CI_REPORT.md

      - name: Upload CI Report
        uses: actions/upload-artifact@v6
        with:
          name: ci-report
          path: CI_REPORT.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('CI_REPORT.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Check CI Status
        run: |
          echo "::group::Pipeline Status"
          
          test_ui_status="${{ needs.test-ui.result }}"
          test_server_status="${{ needs.test-server.result }}"
          build_status="${{ needs.build.result }}"
          
          echo "Frontend Tests: $test_ui_status"
          echo "Backend Tests: $test_server_status"
          echo "Build: $build_status"
          
          echo "::endgroup::"
          
          if [[ "$test_ui_status" != "success" ]] || \
             [[ "$test_server_status" != "success" ]] || \
             [[ "$build_status" != "success" ]]; then
            echo "::error::CI pipeline failed - see report for details"
            exit 1
          fi
          
          echo "::notice::✅ CI pipeline passed successfully!"

  # ============================================================================
  # DEPLOYMENT: Manual Trigger (Optional)
  # Allows manual deployment to staging/production after approval
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-ui, test-server, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.test-ui.result == 'success' && needs.test-server.result == 'success' && needs.build.result == 'success'
    environment:
      name: staging
      url: https://staging.fider.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Docker image
        uses: actions/download-artifact@v6
        with:
          name: fider-image
          path: ./out

      - name: Load Docker image
        run: |
          docker load -i ./out/fider-image.tar
          docker images | grep fider

      - name: Display build metadata
        run: |
          echo "::group::Build Metadata"
          cat ./out/build-metadata.json | jq .
          echo "::endgroup::"

      - name: Authenticate to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_REGISTRY != ''

      - name: Push to Registry
        id: push
        run: |
          if [ -z "${{ secrets.DOCKER_REGISTRY }}" ]; then
            echo "::warning::Docker registry secrets not configured - skipping push"
            exit 0
          fi
          
          echo "::group::Pushing to Registry"
          REGISTRY="${{ secrets.DOCKER_REGISTRY }}"
          SHA7=$(cat ./out/sha7)
          
          docker load -i ./out/fider-image.tar
          docker tag fider-image:latest $REGISTRY/fider:latest
          docker tag fider-image:latest $REGISTRY/fider:$SHA7
          
          docker push $REGISTRY/fider:latest
          docker push $REGISTRY/fider:$SHA7
          
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "version=$SHA7" >> $GITHUB_OUTPUT
          echo "::endgroup::"
        if: secrets.DOCKER_REGISTRY != ''

      - name: Deploy to Staging
        id: deploy
        run: |
          echo "::group::Deployment Execution"
          
          if [ -z "${{ secrets.DOCKER_REGISTRY }}" ]; then
            echo "::warning::Deployment skipped - secrets not configured"
            echo "configured=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Deploying to staging environment..."
          echo "Registry: ${{ steps.push.outputs.registry }}"
          echo "Version: ${{ steps.push.outputs.version }}"
          
          # Example: Kubernetes deployment
          # kubectl set image deployment/fider fider=${{ steps.push.outputs.registry }}/fider:${{ steps.push.outputs.version }}
          # kubectl rollout status deployment/fider
          
          # Or: Docker Compose deployment
          # docker compose -f docker-compose.staging.yml pull
          # docker compose -f docker-compose.staging.yml up -d
          
          echo "Deploy script template - configure with your deployment commands"
          echo "configured=true" >> $GITHUB_OUTPUT
          
          echo "::endgroup::"

      - name: Verify Deployment
        if: steps.deploy.outputs.configured == 'true'
        run: |
          echo "::group::Deployment Verification"
          
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if curl -f https://staging.fider.example.com/health 2>/dev/null; then
              echo "✅ Staging deployment healthy"
              echo "::endgroup::"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT+1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - waiting for deployment..."
            sleep 10
          done
          
          echo "❌ Staging deployment health check failed"
          echo "::endgroup::"
          exit 1
        continue-on-error: true

      - name: Generate deployment report
        if: always()
        run: |
          cat > deployment-report.md << 'EOF'
          # Staging Deployment Report
          
          **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Status**: ${{ job.status }}
          **Registry**: ${{ steps.push.outputs.registry }}
          **Version**: ${{ steps.push.outputs.version }}
          
          ## Deployment Summary
          - Registry Push: ${{ steps.push.outcome }}
          - Deployment: ${{ steps.deploy.outcome }}
          - Health Check: ${{ steps.verify.outcome }}
          
          ## Next Steps
          If deployment was successful:
          1. Monitor staging environment logs
          2. Run smoke tests
          3. Notify QA team
          4. Plan production deployment
          EOF
          cat deployment-report.md

      - name: Upload deployment report
        uses: actions/upload-artifact@v6
        with:
          name: deployment-report
